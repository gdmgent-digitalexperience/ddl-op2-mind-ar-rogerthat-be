<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDL OP 2 - Mind AR Roger That</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <link rel="stylesheet" href="./css/main.css">    
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./assets/targets.mind; maxTrack: 1; missTolerance: 10;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights"
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false"
    >
        <a-assets>
            <a-asset-item id="uno-reverse-card" src="./assets/uno_reverse_card.glb"></a-asset-item>
        </a-assets>

        <!-- <a-entity mindar-image-target="targetIndex: 0">
            <a-box position="0 0 0" color="red" opacity="0.4"></a-box>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-box position="0 0 0" color="yellow" opacity="0.4"></a-box>
        </a-entity> -->

        <a-entity mindar-image-target="targetIndex: 2">
            <!-- <a-cylinder position="0 0 0" color="blue" opacity="0.4" height="1" radius="0.5"></a-cylinder> -->
            <a-gltf-model src="#uno-reverse-card" position="0 0 0" rotation="90 0 0" scale="20 20 20"></a-gltf-model>
        </a-entity>

        <!-- <a-entity mindar-image-target="targetIndex: 3">
            <a-plane position="0 0 0" rotation="0 0 0" width="1" height="1" color="green" opacity="0.6"></a-plane>
        </a-entity> -->

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>

</body>
</html>
